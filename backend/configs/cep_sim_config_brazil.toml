[survey]
zip_path      = "backend/data/raw/DYNATA Raw Data CSV for Brazil and UK.zip"
data_file     = "DYNATA Raw Data CSV for Brazil and UK/Brazil/1301337-data-Stage_3_Brazil_Heineken_Feb_2026-03-26-2026-CX--Default.csv"
codebook_file = "DYNATA Raw Data CSV for Brazil and UK/Brazil/1301337-Stage_3_Brazil_Heineken_Feb_2026-03-26-2026-CX--Default.txt"
respondent_id_column = "CID"
country       = "Brazil"

[survey.demographic_columns]
gender       = "Q2"     # 1=Masculino 2=Feminino 3=Não binário
age          = "Q3"     # coded 1=18 2=19 ... 43=60 44=61+
income       = "Q6"     # household income bracket
has_children = "Q7"     # 1=Sim 2=Não

[survey.recall]
cep_blocks     = ["Q10","Q11","Q12","Q13","Q14","Q15","Q16","Q17","Q18","Q19","Q20"]
exclude_brands = ["Nenhuma das opções acima"]

[defaults]
assoc_strength_if_mentioned = 1.0
base_usage_default          = 0.2
learning_rate               = 0.1
competition_penalty_weight  = 0.05
softmax_temperature         = 1.0
w_max                       = 5.0
new_edge_weight             = 0.3
base_prior_weight           = 1.0

[output]
processed_dir = "backend/data/processed"
outputs_dir   = "outputs/cep_sim/brazil"

[ad]
ad_id                    = "heineken_after_work_sports_001"
brand_id                 = "brand_heineken"
brand_name               = "Heineken"
focal_scenario           = "meeting_friends_after_work"
focal_cep_keywords       = ["encontrando amigos", "bar da moda"]
secondary_cep_keywords   = ["churrasco", "futebol"]
branding_clarity         = 0.9
attention_weight         = 1.0
channel                  = "digital_video"
emotion                  = "social_warmth"
